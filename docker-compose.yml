version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: chaikafe-postgres
    environment:
      POSTGRES_DB: chaikafe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chaikafe"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./chaikafe-backend
    container_name: chaikafe-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: chaikafe
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./chaikafe-frontend
    container_name: chaikafe-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data: